<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFAIT SAFE MODE V86.0</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; --neon: #00ff00; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { width: 350px; text-align: center; border: 5px solid var(--gold); border-radius: 50px; padding: 25px; background: #0a0a0a; box-shadow: 0 0 50px rgba(255, 215, 0, 0.2); }
        .timer { font-size: 60px; font-weight: 900; color: #ff0000; margin: 10px 0; }
        .box { border: 2px solid #333; border-radius: 30px; padding: 20px; margin-bottom: 15px; }
        .num { font-size: 70px; color: var(--gold); font-weight: 900; }
        .bs { font-size: 35px; color: var(--neon); font-weight: bold; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="panel">
    <div style="font-size: 11px; color: #ff3131;">● RECOVERY SYSTEM ACTIVE</div>
    <div id="p_id" style="font-size: 10px; margin-top: 5px;">SYNCING...</div>
    <div class="timer" id="timer">00s</div>

    <div class="box">
        <div style="font-size: 10px; color: #888;">LOW RISK NUMBER</div>
        <div class="num" id="n_val">?</div>
    </div>

    <div class="box">
        <div style="font-size: 10px; color: #888;">MAIN TARGET</div>
        <div class="bs" id="bs_val">---</div>
    </div>

    <div style="font-size: 10px; color: #444; letter-spacing: 5px;">HACKER SAFAIT</div>
</div>

<script>
    // আপনার লস হিস্ট্রি থেকে ১টি সেইফ প্যাটার্ন লজিক
    const safeSeed = [4, 8, 2, 7, 3, 9, 1, 0, 6, 5];

    function update() {
        const now = new Date();
        const sec = now.getSeconds();
        let rem = 60 - sec;
        document.getElementById('timer').innerText = rem.toString().padStart(2, '0') + "s";

        let totalMin = (now.getHours() * 60) + now.getMinutes();
        
        // বর্তমান সময় ১২:০৭ PM অনুযায়ী পিরিয়ড ১০৩৬৬ সিঙ্ক
        let base = 10366 - ((12 * 60) + 7); 
        let currentP = base + totalMin;
        
        document.getElementById('p_id').innerText = "PERIOD: 202603101000" + currentP;

        let n = safeSeed[currentP % 10];
        document.getElementById('n_val').innerText = n;
        
        let bs = (n >= 5) ? "BIG" : "SMALL";
        document.getElementById('bs_val').innerText = bs;
    }

    setInterval(update, 1000);
</script>
</body>
</html>
