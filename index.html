<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFAIT RECOVERY V86.2</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; --neon: #00ff00; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { width: 350px; text-align: center; border: 5px solid var(--gold); border-radius: 50px; padding: 25px; background: #0a0a0a; box-shadow: 0 0 50px rgba(255, 215, 0, 0.3); }
        .timer { font-size: 65px; font-weight: 900; color: #ff3131; margin: 10px 0; }
        .box { border: 2px solid #333; border-radius: 30px; padding: 20px; margin-bottom: 15px; background: rgba(0, 255, 0, 0.05); }
        .num { font-size: 75px; color: var(--gold); font-weight: 900; text-shadow: 0 0 20px var(--gold); }
        .bs { font-size: 40px; color: var(--neon); font-weight: bold; letter-spacing: 5px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="panel">
    <div style="font-size: 11px; color: #ff3131; font-weight: bold;">● LIVE SERVER CONNECTED</div>
    <div id="p_id" style="font-size: 11px; margin-top: 5px; color: #00ffff;">SYNCING PERIOD...</div>
    <div class="timer" id="timer">00s</div>

    <div class="box">
        <div style="font-size: 10px; color: #aaa;">SNIPER NUMBER</div>
        <div class="num" id="n_val">?</div>
    </div>

    <div class="box">
        <div style="font-size: 10px; color: #aaa;">MAIN PREDICTION</div>
        <div class="bs" id="bs_val">---</div>
    </div>

    <div style="font-size: 10px; color: #444; letter-spacing: 5px;">HACKER SAFAIT</div>
</div>

<script>
    const recoverySeed = [4, 2, 8, 3, 7, 1, 9, 0, 6, 5];

    function update() {
        const now = new Date();
        const sec = now.getSeconds();
        let rem = 60 - sec;
        document.getElementById('timer').innerText = rem.toString().padStart(2, '0') + "s";

        let totalMin = (now.getHours() * 60) + now.getMinutes();
        
        // দুপুর ১২:২১ PM অনুযায়ী পিরিয়ড ১০৩৭১ এর সাথে সিঙ্ক ফিক্স
        let base = 10371 - ((12 * 60) + 21); 
        let currentP = base + totalMin;
        
        document.getElementById('p_id').innerText = "PERIOD: 202603101000" + currentP;

        let n = recoverySeed[currentP % 10];
        document.getElementById('n_val').innerText = n;
        
        let bs = (n >= 5) ? "BIG" : "SMALL";
        document.getElementById('bs_val').innerText = bs;
        document.getElementById('bs_val').style.color = (bs === "BIG") ? "#FFD700" : "#00ffff";
    }

    setInterval(update, 1000);
    window.onload = update;
</script>
</body>
</html>
